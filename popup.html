<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Equity Watch</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #fff;
      width: 280px;
      padding: 16px;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 4px;
    }

    input[type="text"],
    input[type="url"],
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      color: #1f2937;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 10px;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    select:focus {
      border-color: #3b82f6;
    }

    button[type="submit"] {
      width: 100%;
      padding: 7px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #2563eb;
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: default;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      min-height: 16px;
      text-align: center;
    }

    #status.success { color: #16a34a; }
    #status.error   { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Private Equity Watch</h1>
  <p class="subtitle">Know a PE-owned site or channel that's missing?</p>

  <form id="suggest-form">
    <label for="platform">Type *</label>
    <select id="platform" required>
      <option value="youtube">YouTube channel</option>
      <option value="website">Website</option>
      <option value="other">Other</option>
    </select>

    <label for="channel-name">Name *</label>
    <input type="text" id="channel-name" placeholder="e.g. Veritasium or buzzfeed.com" maxlength="200" required>

    <label for="channel-url">URL (optional)</label>
    <input type="url" id="channel-url" placeholder="https://..." maxlength="500">

    <button type="submit" id="submit-btn">Submit</button>
  </form>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
